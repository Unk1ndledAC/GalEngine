# =============================================================================
# GalEngine Editor — electron-builder Configuration
# =============================================================================
# Packages a closed-source distributable:
#   - Source .ts/.tsx files are NOT included (only compiled JS)
#   - All app code is packed into app.asar (obfuscates internals)
#   - Produces NSIS installer + portable folder for Windows
# =============================================================================

appId: com.galengine.editor
productName: GalEngine Editor
copyright: "Copyright (c) 2026 GalEngine"

# ----- Directories -----
directories:
  output: release        # Where to write packaged output
  buildResources: resources  # Icons, installer graphics, etc.

# ----- Files to include (whitelist — anything not listed is excluded) -----
# electron-builder auto-includes:
#   - package.json + main entry
#   - dependencies (not devDependencies) from node_modules
#   - Electron runtime binary
# We explicitly add our compiled output and resources.
files:
  - dist/**/*            # Compiled main process + built renderer
  - resources/**/*       # Icons and bundled assets

# ----- Source Code Protection -----
asar: true               # Pack all app code into app.asar (closed-source)
# No asarUnpack — everything stays packed for source protection

# ----- Exclude dev/build artifacts -----
# These are in the source tree but NOT needed at runtime
extraResources: []

# =============================================================================
# Windows Configuration
# =============================================================================
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/icon.ico
  # Disable code signing + executable resource editing (winCodeSign).
  # Required because electron-builder downloads winCodeSign-2.6.0.7z from GitHub
  # (blocked in China) and we have no signing certificate anyway.
  # Trade-off: .exe header won't have embedded icon, but NSIS shortcuts still use
  # installerIcon / uninstallerIcon.
  signAndEditExecutable: false
  # Signing (requires code signing certificate — uncomment when available)
  # certificateFile: path/to/cert.pfx
  # certificatePassword: ${CERT_PASSWORD}

# =============================================================================
# NSIS Installer (Windows)
# =============================================================================
# This produces a standard installer .exe — NOT a single-file portable exe.
# The installed result is a folder with GalEngine Editor.exe + supporting files.
nsis:
  oneClick: false            # Show installer wizard (not one-click)
  perMachine: false          # Install per-user (no admin required)
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: GalEngine Editor
  uninstallDisplayName: GalEngine Editor
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  installerHeaderIcon: resources/icons/icon.ico
  # License file (optional)
  # license: LICENSE.txt

# =============================================================================
# macOS Configuration
# =============================================================================
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icons/icon.icns
  category: public.app-category.developer-tools
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  title: GalEngine Editor ${version}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# =============================================================================
# Linux Configuration
# =============================================================================
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icons/icon.png
  category: Development

# =============================================================================
# Electron Download Mirror (for users in China)
# =============================================================================
# Default: electron-builder downloads Electron binaries from GitHub.
# If GitHub is blocked, uncomment and set to a local mirror URL.
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/

# =============================================================================
# Publish Configuration (optional — for auto-update)
# =============================================================================
